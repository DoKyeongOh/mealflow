spring.application.name=mealflow

# Database — defaults follow infra/docker-compose.yml (service mysql):
#   MYSQL_DATABASE=app_db, MYSQL_USER=app_user, MYSQL_PASSWORD=app1234, ports "3306:3306"
# Override with DATABASE_URL / DATABASE_USERNAME / DATABASE_PASSWORD when not using that compose file.
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/app_db?createDatabaseIfNotExist=true&characterEncoding=UTF-8&connectionTimeZone=UTC}
spring.datasource.username=${DATABASE_USERNAME:app_user}
spring.datasource.password=${DATABASE_PASSWORD:app1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Google OAuth2 / OIDC (set GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET in the environment)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
